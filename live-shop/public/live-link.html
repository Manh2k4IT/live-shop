<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mo gio hang</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --bg1: #f6f9ff;
      --bg2: #eef3ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #dc2626;
      --accent-dark: #b91c1c;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      font-family: "Be Vietnam Pro", "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg1) 35%, var(--bg2) 100%);
    }

    .card {
      width: min(540px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 11px 16px;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .btn.primary {
      color: #fff;
      background: var(--accent);
    }

    .btn.primary:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .btn.ghost {
      color: var(--text);
      border-color: var(--line);
      background: #fff;
    }

    .status {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fee2e2;
      color: #991b1b;
      font-weight: 700;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Dang mo trang gio hang...</h1>
    <p>
      Neu app Facebook chua tu mo ngay, bam nut ben duoi de vao gio hang.
    </p>
    <span id="status" class="status">Dang chuyen huong</span>
    <div class="buttons">
      <a id="openBtn" class="btn primary" href="/shop.html?view=cart#cart">Mo gio hang ngay</a>
      <a class="btn ghost" href="/shop.html">Ve trang shop</a>
    </div>
  </main>

  <script>
    (function () {
      const TARGET = "/shop.html?view=cart#cart";
      const statusEl = document.getElementById("status");
      const openBtn = document.getElementById("openBtn");
      if (openBtn) openBtn.href = TARGET;

      const ua = String(navigator.userAgent || "").toLowerCase();
      const isFacebookIab = ua.includes("fban") || ua.includes("fbav") || ua.includes("fb_iab") || ua.includes("fb4a") || ua.includes("fbios");

      const go = () => {
        if (statusEl) statusEl.textContent = "Dang mo gio hang";
        window.location.replace(TARGET);
      };

      if (isFacebookIab) {
        if (statusEl) statusEl.textContent = "Dang mo trong trinh duyet Facebook";
        // Small delay gives Facebook IAB enough time to settle before redirecting.
        setTimeout(go, 220);
      } else {
        setTimeout(go, 80);
      }
    })();
  </script>
</body>
</html>
