<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIVE SHOP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #008060;
      --accent-dark: #006b50;
      --border: #e5e7eb;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Be Vietnam Pro", "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(380px, 0.95fr);
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }

    .page.single-panel {
      grid-template-columns: minmax(0, 1fr);
    }

    .hidden-view {
      display: none !important;
    }

    .panel {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
      min-width: 0;
      overflow: hidden;
    }

    .panel-header {
      margin: 0 0 6px;
      padding: 24px 24px 10px;
      line-height: 1.2;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2 {
      font-size: 24px;
    }

    .panel-header p {
      margin: 0;
      color: var(--muted);
    }

    .cart-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .cart-page-back {
      border: 1px solid #d7dee7;
      background: #ffffff;
      color: #111827;
      border-radius: 10px;
      padding: 7px 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .cart-page-back:hover {
      background: #f8fafc;
    }

    .shop-header-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
      text-align: center;
    }

    .shop-header-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .shop-header-logo {
      width: 110px;
      height: auto;
      max-height: 110px;
      object-fit: contain;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      padding: 4px;
      flex-shrink: 0;
    }

    .shop-header-title {
      margin: 0;
      text-align: center;
    }

    .shop-header-desc {
      text-align: center;
    }

    .shop-cart-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border: 1px solid #d7dee7;
      background: #ffffff;
      color: #111827;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }

    .shop-cart-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .shop-cart-button-icon {
      font-size: 18px;
      line-height: 1;
    }

    .shop-cart-button-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      border: 2px solid #fff;
      box-shadow: 0 6px 14px rgba(239, 68, 68, 0.28);
    }

    .shop-cart-button-badge.hidden {
      display: none;
    }

    .content {
      min-width: 0;
      padding: 18px 22px 22px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .product-grid.category-list {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .product-grid.category-list .category-section {
      margin-bottom: 0;
    }

    .product-grid.category-list .category-section .product-grid {
      grid-template-columns: 1fr;
    }

    .category-section .product-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .category-section {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      background: #ffffff;
      margin-bottom: 14px;
    }

    .category-cart-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 1px solid rgba(0, 128, 96, 0.22);
      background: #effaf7;
      color: var(--accent-dark);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .category-cart-btn:hover {
      background: #dff7ef;
    }

    .product-image-wrap {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #f3f4f6;
    }

    .product-main-image {
      width: 100%;
      height: auto;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
    }


    .product-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: #fcfdff;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 100%;
    }

    .product-card img {
      width: 100%;
      height: auto;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
    }

    .product-name {
      font-weight: 700;
      font-size: 17px;
      line-height: 1.35;
      min-height: calc(1.35em * 3);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      overflow: hidden;
    }

    .product-meta {
      color: var(--muted);
      font-size: 14px;
    }

    .price-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      margin-top: auto;
      gap: 12px;
    }

    .product-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      width: min(230px, 100%);
    }

    .product-actions .btn {
      min-width: 0;
      flex: 1 1 100px;
      width: 100%;
      padding: 9px 12px;
      white-space: nowrap;
    }

    .price-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .price {
      font-size: 18px;
      font-weight: 700;
      color: var(--danger);
    }

    .price-old {
      font-size: 13px;
      color: var(--muted);
      text-decoration: line-through;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .cart-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
      position: relative;
      padding-right: 46px;
    }

    .cart-category-block {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #ffffff;
      padding: 14px;
      margin-bottom: 14px;
    }

    .cart-category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .cart-category-header strong {
      font-size: 15px;
    }

    .cart-category-header span {
      color: var(--muted);
      font-size: 12px;
    }

    .cart-category-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
      font-weight: 700;
    }

    .cart-category-total-amount {
      font-size: 15px;
      font-weight: 800;
      color: var(--accent-dark);
    }

    .cart-card img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 12px;
      background: #e5e7eb;
    }

    .cart-info {
      flex: 1;
      min-width: 0;
    }

    .cart-option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .cart-option-grid > .cart-option-field:only-child {
      grid-column: 1 / -1;
    }

    .cart-option-field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .cart-option-label {
      font-size: 12px;
      color: #475569;
      font-weight: 700;
    }

    .cart-option-select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 11px;
      background: #fff;
      color: #111827;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 12px;
    }

    .cart-remove {
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .cart-remove:hover {
      background: #fecaca;
    }

    .cart-name {
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      overflow: hidden;
    }

    .cart-qty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
    }

    .cart-meta-compact {
      margin-top: 2px;
    }

    .qty-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .qty-value {
      min-width: 24px;
      text-align: center;
      font-weight: 700;
    }

    .cart-total {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 18px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
    }

    .checkout-form {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .checkout-form input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
    }

    .checkout-form button {
      min-width: 0;
      margin-top: 4px;
    }

    .checkout-submit-total {
      margin-top: 2px;
      font-size: 14px;
      font-weight: 800;
      color: #b91c1c;
      text-align: right;
      line-height: 1.45;
    }

    .btn-buy-red {
      background: #dc2626;
      color: #fff;
    }

    .btn-buy-red:hover {
      background: #b91c1c;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 0;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateY(12px);
      padding: 16px 22px;
      border-radius: 14px;
      color: white;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
      word-break: break-word;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 1000;
      min-width: 240px;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0);
    }

    .toast.success {
      background: #0f9d6e;
    }

    .toast.error {
      background: #dc2626;
    }

    .cart-popup {
      position: fixed;
      inset: 0;
      z-index: 1200;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.2s ease;
    }

    .cart-popup.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .cart-popup.busy .popup-variant-thumb,
    .cart-popup.busy .popup-size-chip,
    .cart-popup.busy .qty-btn,
    .cart-popup.busy .popup-edit-btn {
      pointer-events: none;
      opacity: 0.72;
    }

    .cart-popup-sheet {
      width: min(560px, 100%);
      max-height: 88vh;
      background: white;
      border-radius: 22px 22px 0 0;
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.28);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateY(0);
      transition: transform 0.22s ease;
      overflow: hidden;
    }

    .cart-popup.hidden .cart-popup-sheet {
      transform: translateY(16px);
    }

    .cart-popup-handle {
      width: 54px;
      height: 5px;
      background: #d1d5db;
      border-radius: 999px;
      margin: 10px auto 4px;
    }

    .cart-popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px 10px;
      border-bottom: 1px solid #edf0f4;
    }

    .cart-popup-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cart-popup-title strong {
      font-size: 16px;
      letter-spacing: 0.01em;
    }

    .cart-popup-title span {
      font-size: 12px;
      color: var(--muted);
    }

    .cart-popup-close {
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      cursor: pointer;
      position: relative;
      z-index: 5;
      pointer-events: auto;
    }

    .cart-popup-body {
      padding: 12px 12px 14px;
      overflow: auto;
    }

    .popup-product-card {
      position: relative;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fff;
    }

    .popup-product-card.is-summary {
      background: #fafafa;
      border-style: dashed;
    }

    .popup-product-card.is-editor {
      border-color: #fda4af;
      box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.08);
    }

    .popup-summary-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .popup-edit-btn {
      border: 1px solid #fda4af;
      background: #fff1f4;
      color: #be123c;
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }

    .popup-product-head {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .popup-product-image {
      width: 96px;
      height: 96px;
      border-radius: 12px;
      object-fit: cover;
      background: #e5e7eb;
      display: block;
    }

    .popup-price-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .popup-discount-badge {
      background: #ff2d5e;
      color: #fff;
      border-radius: 8px;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    .popup-price-now {
      color: #e11d48;
      font-size: 32px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .popup-price-old {
      color: #9ca3af;
      text-decoration: line-through;
      font-size: 18px;
      line-height: 1;
      font-weight: 600;
    }

    .popup-product-name {
      font-weight: 700;
      font-size: 15px;
      line-height: 1.25;
      color: #374151;
    }

    .popup-meta {
      color: #6b7280;
      font-size: 13px;
      margin-top: 2px;
    }

    .popup-section-title {
      margin-top: 12px;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .popup-variant-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .popup-variant-thumb {
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 12px;
      padding: 4px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s ease;
    }

    .popup-variant-thumb:disabled {
      cursor: not-allowed;
    }

    .popup-variant-image-wrap {
      position: relative;
      border-radius: 9px;
      overflow: hidden;
    }

    .popup-variant-thumb img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 9px;
      display: block;
    }

    .popup-variant-thumb.out {
      opacity: 0.62;
      border-style: dashed;
    }

    .popup-variant-thumb.out img {
      filter: grayscale(0.2) brightness(0.78);
    }

    .popup-variant-soldout {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(17, 24, 39, 0.38);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }

    .popup-variant-label {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      color: #1f2937;
      text-transform: uppercase;
      min-height: 28px;
    }

    .popup-variant-stock {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      font-weight: 700;
      color: #0f766e;
    }

    .popup-variant-thumb.active {
      border-color: #ff2d5e;
      box-shadow: 0 0 0 2px rgba(255, 45, 94, 0.15);
    }

    .popup-size-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2px;
    }

    .popup-size-chip {
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 999px;
      padding: 6px 12px;
      min-width: 52px;
      text-align: center;
      font-weight: 700;
      color: #1f2937;
      cursor: pointer;
    }

    .popup-size-chip.active {
      border-color: #ff2d5e;
      color: #be123c;
      background: #fff1f4;
      box-shadow: 0 0 0 2px rgba(255, 45, 94, 0.12);
    }

    .popup-size-chip.out {
      opacity: 0.5;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .popup-qty-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .popup-qty-row span {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .popup-selected-combo {
      margin-top: 8px;
      color: #0f766e;
      font-size: 13px;
      font-weight: 700;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .popup-stock-empty {
      margin-top: 8px;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 800;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .cart-popup .qty-control {
      margin-top: 0;
      gap: 0;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      background: #f9fafb;
    }

    .cart-popup .qty-btn {
      width: 36px;
      height: 34px;
      border: none;
      border-radius: 0;
      background: transparent;
      font-size: 22px;
      line-height: 1;
      color: #111827;
    }

    .cart-popup .qty-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .cart-popup .qty-value {
      min-width: 42px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
      color: #111827;
      border-left: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      height: 34px;
      display: grid;
      place-items: center;
      background: #fff;
    }

    .popup-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      width: 28px;

<body>
  <div id="toast" class="toast"></div>
  <div id="cartPopup" class="cart-popup hidden"></div>
  <div id="imageViewer" class="image-viewer hidden" onclick="if (event.target === this) closeImageViewer()">
    <button type="button" class="image-viewer-close" onclick="closeImageViewer()" aria-label="Đóng xem ảnh">×</button>
    <img id="imageViewerImg" src="" alt="Xem ảnh sản phẩm" loading="eager" decoding="async" />
  </div>
  <div id="successModal" class="success-modal hidden">
    <div class="success-modal-card">
      <div class="success-modal-icon">✓</div>
      <div class="success-modal-title">Đặt hàng thành công</div>
      <div class="success-modal-text">Quý khách đã đặt hàng trên phiên live thành công. Chúng tôi sẽ liên hệ sớm.</div>
    </div>
  </div>

  <div id="pageLayout" class="page">
    <section id="productsPanel" class="panel">
      <div class="panel-header">
        <div class="shop-header-topbar">
          <div class="shop-header-brand">
            <img id="shopLogo" class="shop-header-logo" src="/uploads/logogiohang.jpg" alt="GUSA Logo" />
            <h2 id="productsHeaderTitle" class="shop-header-title">🛍 SẢN PHẨM</h2>
          </div>
          <button type="button" class="shop-cart-button" onclick="goToCartPage()" aria-label="Giỏ hàng của bạn">
            <span class="shop-cart-button-icon">🛒</span>
            <span class="shop-cart-button-label">Giỏ hàng của bạn</span>
            <span id="shopCartBadge" class="shop-cart-button-badge hidden">0</span>
          </button>
        </div>
        <p id="productsHeaderDesc" class="shop-header-desc">Gusa – Nâng tầm phong cách với thời trang Linen.</p>
      </div>
      <div class="content">
        <div id="list" class="product-grid"></div>
      </div>
    </section>

    <aside id="cartPanel" class="panel">
      <div class="panel-header">
        <div class="cart-header-row">
          <h2>🛒 Giỏ hàng</h2>
          <button id="cartBackBtn" type="button" class="cart-page-back" onclick="goToShopPage()">← Về shop</button>
        </div>
        <p>Khách hàng sẽ đặt hàng ngay tại đây</p>
      </div>
      <div class="content">
        <div id="cart"></div>
      </div>
    </aside>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const API = window.location.origin || "http://localhost:3000";
    const socket = window.io ? window.io(API) : null;
    const CATEGORY_ORDER = ["Áo", "Quần", "Chân váy", "Đầm", "Khác"];
    const selectedPopupVariantIndexByProduct = new Map();
    let popupActiveItemKey = "";
    let popupActiveProductId = null;
    let productsById = new Map();
    let latestCartItems = [];
    let popupActionInFlight = false;
    let shopSettingsCache = null;
    let lastSettingsFetchAt = 0;
    let lastProductsSyncAt = 0;

    const DEFAULT_SHOP_LOGO = `data:image/svg+xml;utf8,${encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f766e"/>
            <stop offset="100%" stop-color="#0ea5a4"/>
          </linearGradient>
        </defs>
        <rect width="180" height="180" rx="26" fill="url(#g)"/>
        <text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#ffffff">GUSA</text>
      </svg>
    `)}`;

    function setupShopLogo() {
      const logo = document.getElementById("shopLogo");
      if (!logo) return;

      logo.addEventListener("error", () => {
        logo.src = DEFAULT_SHOP_LOGO;
      }, { once: true });
    }

    function applyShopLogo(logoUrl) {
      const logo = document.getElementById("shopLogo");
      if (!logo) return;

      const nextLogo = String(logoUrl || "").trim() || DEFAULT_SHOP_LOGO;
      if (logo.src.endsWith(nextLogo)) return;
      logo.src = nextLogo;
    }

    async function loadShopSettings(force = false) {
      const now = Date.now();
      if (!force && shopSettingsCache && now - lastSettingsFetchAt < 5000) {
        applyShopLogo(shopSettingsCache.shopLogo);
        return shopSettingsCache;
      }

      try {
        const res = await fetch(API + "/settings");
        const data = await res.json();
        if (!res.ok) return shopSettingsCache;

        shopSettingsCache = data || {};
        lastSettingsFetchAt = now;
        applyShopLogo(shopSettingsCache.shopLogo);
        return shopSettingsCache;
      } catch (error) {
        applyShopLogo(DEFAULT_SHOP_LOGO);
        return shopSettingsCache;
      }
    }

    function setPopupBusy(isBusy) {
      const popup = document.getElementById("cartPopup");
      if (!popup) return;
      popup.classList.toggle("busy", Boolean(isBusy));
    }

    function splitImageList(value) {
      if (Array.isArray(value)) {
        return value.map((item) => String(item || "").trim()).filter(Boolean);
      }

      if (typeof value !== "string") return [];

      return value
        .split(/[,\n|]+/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function getVariantImages(product) {
      const colorImages = splitImageList(product?.images);
      if (colorImages.length) return colorImages;
      return splitImageList(product?.image);
    }

    function getVariantNames(product) {
      if (Array.isArray(product?.variantNames)) {
        return product.variantNames.map((item) => String(item || "").trim());
      }

      return splitImageList(product?.variantNames);
    }

    function getAvailableSizes(product) {
      if (Array.isArray(product?.sizes)) {
        return product.sizes.map((item) => String(item || "").trim()).filter(Boolean);
      }
      return splitImageList(product?.sizes);
    }

    function getVariantSizeMatrix(product) {
      if (!Array.isArray(product?.variantSizes)) return [];
      return product.variantSizes.map((row) => {
        if (Array.isArray(row)) {
          return row.map((item) => String(item || "").trim()).filter(Boolean);
        }
        return splitImageList(row);
      });
    }

    function getVariantStockMatrix(product) {
      const source = Array.isArray(product?.variantColorStocks)
        ? product.variantColorStocks
        : (Array.isArray(product?.variantStocks) ? product.variantStocks : []);
      return source.map((qty) => {
        const stock = Number(qty);
        if (!Number.isFinite(stock) || stock < 0) return null;
        return Math.floor(stock);
      });
    }

    function getColorStockByVariant(product, variantIndex, fallbackStock = 0) {
      const safeIndex = Math.max(0, Number(variantIndex) || 0);
      const matrix = getVariantStockMatrix(product);
      const colorStock = matrix[safeIndex];
      const totalStock = Number(product?.stock ?? fallbackStock);
      const safeTotalStock = Number.isFinite(totalStock) ? Math.max(0, Math.floor(totalStock)) : 0;

      if (Number.isFinite(Number(colorStock))) {
        return Math.min(Math.max(0, Math.floor(Number(colorStock))), safeTotalStock);
      }

      const combo = Number(product?.comboStock);
      if (Number.isFinite(combo)) return Math.max(0, Math.floor(combo));

      const stock = Number(product?.stock ?? fallbackStock);
      if (Number.isFinite(stock)) return Math.max(0, Math.floor(stock));

      return 0;
    }

    function getAvailableSizesByVariant(product, variantIndex, fallbackSize = "") {
      if (Array.isArray(product?.availableSizes) && product.availableSizes.length) {
        return product.availableSizes.map((item) => String(item || "").trim()).filter(Boolean);
      }

      const matrix = getVariantSizeMatrix(product);
      const safeIndex = Math.max(0, Number(variantIndex) || 0);
      const rowSizes = Array.isArray(matrix[safeIndex]) ? matrix[safeIndex].filter(Boolean) : [];
      if (rowSizes.length) return rowSizes;

      const fallback = getAvailableSizes(product);
      if (fallback.length) return fallback;

      const safeFallback = String(fallbackSize || "").trim();
      return safeFallback ? [safeFallback] : [];
    }

    function getVariantDisplayName(product, index, image) {
      const names = getVariantNames(product);
      const variants = getVariantImages(product);

      if (names[index]) return names[index];

      const imageValue = String(image || "").trim();
      if (imageValue && variants.length) {
        const byImage = variants.findIndex((item) => item === imageValue);
        if (byImage >= 0 && names[byImage]) return names[byImage];
      }

      return `Màu ${index + 1}`;
    }

    function getPopupItemKey(productId, variantKey = "", sizeKey = "", itemKey = "") {
      if (itemKey) return String(itemKey);
      return `${Number(productId)}::${String(variantKey || "default")}::${String(sizeKey || "size:default")}`;
    }

    function getCurrentQtyForVariant(productId, variantImage, variantName) {
      const targetId = Number(productId);
      const safeImage = String(variantImage || "").trim();
      const safeName = String(variantName || "").trim().toLowerCase();

      return (Array.isArray(latestCartItems) ? latestCartItems : []).reduce((sum, item) => {
        if (Number(item?.id) !== targetId) return sum;

        const itemImage = String(item?.image || "").trim();
        const itemName = String(item?.variantName || "").trim().toLowerCase();
        const sameByImage = safeImage && itemImage === safeImage;
        const sameByName = !safeImage && safeName && itemName === safeName;

        if (!sameByImage && !sameByName) return sum;

        return sum + Math.max(0, Math.floor(Number(item?.qty) || 0));
      }, 0);
    }

    function getPreferredInStockVariantIndex(product, productId = null) {
      const variants = getVariantImages(product);
      if (!variants.length) return 0;

      const names = getVariantNames(product);
      const targetId = Number.isFinite(Number(productId)) ? Number(productId) : Number(product?.id);

      for (let index = 0; index < variants.length; index += 1) {
        const stock = getColorStockByVariant(product, index, Number(product?.stock || 0));
        if (stock <= 0) continue;

        const variantName = names[index] || getVariantDisplayName(product, index, variants[index]);
        const inCartQty = getCurrentQtyForVariant(targetId, variants[index], variantName);
        const remaining = stock - inCartQty;
        if (remaining > 0) return index;
      }

      for (let index = 0; index < variants.length; index += 1) {
        const stock = getColorStockByVariant(product, index, Number(product?.stock || 0));
        if (stock > 0) return index;
      }

      return 0;
    }

    function getSelectedImageForProduct(id) {
      const product = productsById.get(Number(id));
      if (!product) return "";

      const variants = getVariantImages(product);
      const preferredIndex = getPreferredInStockVariantIndex(product, Number(id));
      return variants[preferredIndex] || variants[0] || product.image || "";
    }

    function getSelectedVariantNameForProduct(id) {
      const product = productsById.get(Number(id));
      if (!product) return "";

      const variants = getVariantImages(product);
      const preferredIndex = getPreferredInStockVariantIndex(product, Number(id));
      const image = variants[preferredIndex] || variants[0] || product.image || "";
      return getVariantDisplayName(product, preferredIndex, image);
    }

    function getSelectedSizeForProduct(id) {
      const product = productsById.get(Number(id));
      if (!product) return "";
      const preferredIndex = getPreferredInStockVariantIndex(product, Number(id));
      const sizes = getAvailableSizesByVariant(product, preferredIndex);
      return sizes[0] || "";
    }

    function getPopupSelectedVariantIndex(productId, variantKey, sizeKey, itemKey, variants, itemImage) {
      const key = getPopupItemKey(productId, variantKey, sizeKey, itemKey);
      if (!variants.length) return 0;

      const storedIndex = Number(selectedPopupVariantIndexByProduct.get(key));
      if (Number.isFinite(storedIndex) && storedIndex >= 0 && storedIndex < variants.length) {
        return storedIndex;
      }

      const matchedByImage = variants.findIndex((url) => url === itemImage);
      if (matchedByImage >= 0) return matchedByImage;

      return 0;
    }

    function setPopupActiveItem(itemKey, productId = null) {
      popupActiveItemKey = String(itemKey || "");
      popupActiveProductId = Number.isFinite(Number(productId)) ? Number(productId) : null;
      renderCartPopup();
    }

    async function selectPopupVariantImage(button, productId, variantKey, sizeKey, itemKey, variantIndex) {
      if (popupActionInFlight) return;

      const id = Number(productId);
      const product = productsById.get(id);
      if (!product) return;

      const variants = getVariantImages(product);
      if (!variants.length) return;

      const safeIndex = Math.max(0, Math.min(Number(variantIndex) || 0, variants.length - 1));
      const requestedStock = getColorStockByVariant(product, safeIndex, Number(product?.stock || 0));
      if (requestedStock <= 0) {
        showToast("Màu này đã hết hàng", "error");
        return;
      }

      const key = getPopupItemKey(id, variantKey, sizeKey, itemKey);
      selectedPopupVariantIndexByProduct.set(key, safeIndex);

      const nextImage = variants[safeIndex] || product.image || "";
      const nextVariantName = getVariantDisplayName(product, safeIndex, nextImage);

      const popupBody = document.getElementById("cartPopupBody");
      if (!popupBody) return;

      const card = button?.closest?.(".popup-product-card");
      if (!card) return;

      const itemQty = Number(card.dataset.itemQty || 0);
      const itemCategory = card.dataset.itemCategory || getCurrentCategory();
      const currentKey = card.dataset.variantKey || String(variantKey || "default");
      const currentSize = card.dataset.selectedSize || "";
      const currentItemKey = card.dataset.itemKey || String(itemKey || "");

      const nextSizes = getAvailableSizesByVariant(product, safeIndex, currentSize);
      const normalizedCurrentSize = String(currentSize || "").trim();
      const currentMatch = nextSizes.find((size) => size.toLowerCase() === normalizedCurrentSize.toLowerCase());
      const nextSize = currentMatch || nextSizes[0] || "";

      const comboStock = getColorStockByVariant(product, safeIndex, Number(card.dataset.comboStock || 0));

          body: JSON.stringify({

            qty: nextQty,
            category: itemCategory,
            itemKey: currentItemKey,
            variantKey: currentKey,
            image: nextImage,
            variantName: nextVariantName,
            size: nextSize

    function compactCartDuplicates(rawItems) {
      const source = Array.isArray(rawItems) ? rawItems : [];
      if (source.length <= 1) return source;

      const byProduct = new Map();
      source.forEach((item) => {
        const key = `${Number(item.id)}::${normalizeCategory(item.category || "Khác")}`;
        if (!byProduct.has(key)) byProduct.set(key, []);
        byProduct.get(key).push(item);
      });

      const duplicatedGroups = [...byProduct.values()].filter((group) => group.length > 1);
      if (!duplicatedGroups.length) return source;

      const compacted = [];

      byProduct.forEach((group) => {
        if (group.length === 1) {
          compacted.push(group[0]);
          return;
        }

        const ranked = [...group].sort((a, b) => {
          const aLimit = Number.isFinite(Number(a?.comboStock)) ? Number(a.comboStock) : Number(a?.stock || 0);
          const bLimit = Number.isFinite(Number(b?.comboStock)) ? Number(b.comboStock) : Number(b?.stock || 0);
          return bLimit - aLimit;
        });

        const primary = { ...ranked[0] };
        const totalQty = group.reduce((sum, item) => sum + Math.max(0, Math.floor(Number(item?.qty) || 0)), 0);
        const primaryLimitRaw = Number.isFinite(Number(primary?.comboStock)) ? Number(primary.comboStock) : Number(primary?.stock || totalQty);
        const primaryLimit = Math.max(0, Math.floor(primaryLimitRaw || 0));
        primary.qty = Math.min(totalQty, primaryLimit || totalQty);

        if (primary.qty > 0) compacted.push(primary);
      });

      return compacted;
    }

    function normalizeCategory(value) {
      const raw = String(value || "Khác").trim();
      return raw || "Khác";
    }

    function getOptimizedDisplayImageUrl(rawUrl, width = 640) {
      const src = String(rawUrl || "").trim();
      if (!src) return "";
      if (!src.startsWith("/uploads/")) return src;
      const safeWidth = Math.max(160, Math.min(1400, Math.floor(Number(width) || 640)));
      return `/img?src=${encodeURIComponent(src)}&w=${safeWidth}&q=74`;
    }

    function getOrderedCategories(items) {
      const seen = new Set();
      const ordered = [];

      items.forEach((item) => {
        const category = normalizeCategory(item.category);
        if (seen.has(category)) return;
        seen.add(category);
        ordered.push(category);
      });

      return ordered;
    }

    function groupItemsByCategory(items) {
      const groups = new Map();
      items.forEach((item) => {
        const category = normalizeCategory(item.category);
        if (!groups.has(category)) groups.set(category, []);
        groups.get(category).push(item);
      });
      return groups;
    }

      if (!product) return 0;

      if (!variants.length) return 0;

      const safeIndex = Number(quickOrderState.variantIndex);
      if (Number.isFinite(safeIndex) && safeIndex >= 0 && safeIndex < variants.length) return safeIndex;
      return getPreferredInStockVariantIndex(product, Number(product?.id));

    function syncQuickOrderStateFromProduct(product) {
      if (!product) return;
      const variantIndex = getQuickOrderSelectedVariantIndex(product);
      const sizes = getAvailableSizesByVariant(product, variantIndex);
      const currentSize = String(quickOrderState.size || "").trim();
      const matchedSize = sizes.find((size) => size.toLowerCase() === currentSize.toLowerCase());
      quickOrderState.variantIndex = variantIndex;
      quickOrderState.size = matchedSize || sizes[0] || currentSize;
      const stock = getColorStockByVariant(product, variantIndex, Number(product?.stock || 0));
      quickOrderState.qty = Math.max(1, Math.min(Number(quickOrderState.qty || 1), Math.max(1, stock)));
    }

    async function refreshRealtimeData() {
      if (isRealtimeRefreshing) {
        hasPendingRealtimeRefresh = true;
        return;
      }

      isRealtimeRefreshing = true;
      try {
        await loadCart();

        const now = Date.now();
        if (forceProductReloadOnNextRefresh || now - lastRealtimeFullRefreshAt > 3500) {
          forceProductReloadOnNextRefresh = false;
          await load(false);
          lastRealtimeFullRefreshAt = now;
        }
      } finally {
        isRealtimeRefreshing = false;
        if (hasPendingRealtimeRefresh) {
          hasPendingRealtimeRefresh = false;
          scheduleRealtimeRefresh(120);
        }
      }
    }

    function scheduleRealtimeRefresh(delay = 0) {
      if (refreshTimer) {
        clearTimeout(refreshTimer);
      }

      refreshTimer = setTimeout(() => {
        refreshTimer = null;
        refreshRealtimeData();
      }, Math.max(0, Number(delay) || 0));
    }

    if (socket) {
      socket.on("update", () => {
        forceProductReloadOnNextRefresh = true;

        if (document.hidden) {
          hasDeferredSocketRefresh = true;
          return;
        }

        scheduleRealtimeRefresh(80);
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && hasDeferredSocketRefresh) {
          hasDeferredSocketRefresh = false;
          scheduleRealtimeRefresh(60);
        }
      });
    }

              </div>

              </div>

      }).join("");

      const list = document.getElementById("list");
      if (!list) return;

      list.className = "product-grid";
      list.innerHTML = html || `<div class="empty">${category ? `Danh mục ${category} đang trống` : "Chưa có sản phẩm nào"}</div>`;

    async function renderCartPopup(forceRefresh = false) {
      clearPopupMessages();
      const popupBody = document.getElementById("cartPopupBody");
      if (!popupBody) return;
      let rawData = [];
      let productsMap = {};

      const canUseCached = !forceRefresh && Array.isArray(latestCartItems) && latestCartItems.length && productsById.size;

      if (canUseCached) {
        rawData = latestCartItems;
        productsMap = Object.fromEntries([...productsById.entries()]);
      } else {
        const [cartRes, productsRes] = await Promise.all([fetch(getCategoryCartUrl()), fetch(getCategoryProductsUrl())]);
        const initialCartData = await cartRes.json();
        rawData = await compactCartDuplicates(initialCartData);
        const productsData = await productsRes.json();
        productsMap = Object.fromEntries(productsData.map((product) => [product.id, product]));
        latestCartItems = Array.isArray(rawData) ? rawData : [];
        productsById = new Map(productsData.map((item) => [Number(item.id), item]));
      }

      const data = (Array.isArray(rawData) ? rawData : []).map((item) => ({
        ...item,
        _popupKey: String(item.itemKey || `${Number(item.id)}::${String(item.variantKey || "default")}::${String(item.sizeKey || "size:default")}`)
      }));
      latestCartItems = data;
      updateShopCartBadge();

      if (!data.length) {
        popupActiveItemKey = "";
        popupActiveProductId = null;
        popupBody.innerHTML = '<div class="empty">Giỏ hàng đang trống</div>';
        return;
      }

      if (Number.isFinite(Number(popupActiveProductId))) {
        const preferred = data.find((item) => Number(item.id) === Number(popupActiveProductId));
        if (preferred) {
          popupActiveItemKey = preferred._popupKey;
        }
        popupActiveProductId = null;
      }

      if (!popupActiveItemKey || !data.some((item) => item._popupKey === popupActiveItemKey)) {
        popupActiveItemKey = data[0]._popupKey;
      }

      let html = "";
      let total = 0;

      data.forEach((item) => {
        const product = productsMap[item.id];
        const price = Number(product?.price ?? item.price ?? 0);
        const oldPrice = Number(product?.oldPrice ?? item.oldPrice ?? price);
        const discountPercent = oldPrice > price ? Math.round((1 - price / oldPrice) * 100) : 0;
        const variants = getVariantImages(product || item);
        const selectedSize = String(item.selectedSize || "").trim();
        const selectedVariantIndex = getPopupSelectedVariantIndex(
          item.id,
          item.variantKey || "",
          item.sizeKey || "",
          item.itemKey || "",
          variants,
          item.image || ""
        );
        const selectedVariantImage = variants[selectedVariantIndex] || item.image || product?.image || "https://placehold.co/80x80?text=No+Image";
        const selectedVariantImageDisplay = getOptimizedDisplayImageUrl(selectedVariantImage, 420);
        const selectedVariantName = item.variantName || getVariantDisplayName(product || item, selectedVariantIndex, selectedVariantImage);
        const sizes = getAvailableSizesByVariant(product || item, selectedVariantIndex, selectedSize);
        const finalSelectedSize = sizes.find((size) => size.toLowerCase() === selectedSize.toLowerCase()) || sizes[0] || selectedSize;
        const comboStock = getColorStockByVariant(product || item, selectedVariantIndex, Number(item.comboStock ?? product?.stock ?? item.stock ?? 0));
        const lineTotal = price * item.qty;
        const isEditor = popupActiveItemKey === item._popupKey;
        total += lineTotal;
        html += `

    async function changeQtyPopup(id, qty, variantKey = "", sizeKey = "", itemKey = "") {
      if (popupActionInFlight) return;
      popupActionInFlight = true;
      setPopupBusy(true);

      const res = await fetch(API + "/change", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, qty, variantKey, sizeKey, itemKey, category: getCurrentCategory() })
      });
      const data = await res.json();
      if (!res.ok) {
        popupActionInFlight = false;
        setPopupBusy(false);
        showToast(data.error || "Không thể cập nhật số lượng", "error");
        showPopupAlert(data.error || "Không thể cập nhật số lượng");
        return;
      }

      await loadCart();
      renderCartPopup(false);
      popupActionInFlight = false;
      setPopupBusy(false);
      showToast("Đã cập nhật số lượng");
    }

    async function removeItemPopup(id, variantKey = "", sizeKey = "", itemKey = "") {
      if (popupActionInFlight) return;
      popupActionInFlight = true;
      setPopupBusy(true);

      const res = await fetch(API + "/change", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, qty: 0, variantKey, sizeKey, itemKey, category: getCurrentCategory() })
      });
      const data = await res.json();
      if (!res.ok) {
        popupActionInFlight = false;
        setPopupBusy(false);
        showToast(data.error || "Không thể bỏ sản phẩm", "error");
        return;
      }

      await loadCart();
      renderCartPopup(false);
      popupActionInFlight = false;
      setPopupBusy(false);
      showToast("Đã bỏ sản phẩm khỏi giỏ hàng");
    }

    async function checkoutPopup() {
      const customer = document.getElementById("popupCustomerName")?.value.trim() || "";
      const phone = document.getElementById("popupCustomerPhone")?.value.trim() || "";
      const address = document.getElementById("popupCustomerAddress")?.value.trim() || "";
      const category = getCurrentCategory();

      const res = await fetch(API + "/checkout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ customer, phone, address, category })
      });

      const data = await res.json();
      if (!res.ok) {
        showToast(data.error || "Đặt hàng thất bại", "error");
        showPopupAlert(data.error || "Đặt hàng thất bại");
        return;
      }

      closeCartPopup();
      showOrderSuccessModal();
      document.getElementById("popupCustomerName").value = "";
      document.getElementById("popupCustomerPhone").value = "";
      document.getElementById("popupCustomerAddress").value = "";
      await Promise.all([loadCart(), load()]);
    }

    window.selectPopupSize = selectPopupSize;
    window.setPopupActiveItem = setPopupActiveItem;
    window.closeCartPopup = closeCartPopup;
    window.removeItemPopup = removeItemPopup;
    window.changeQtyPopup = changeQtyPopup;
    window.checkoutPopup = checkoutPopup;
    window.changeCartVariant = changeCartVariant;
    window.changeCartSize = changeCartSize;
    window.openImageViewer = openImageViewer;
    window.closeImageViewer = closeImageViewer;

    setupShopLogo();

    function getCheckoutDraft() {
      return {
        customer: document.getElementById("customerName")?.value || "",
        phone: document.getElementById("customerPhone")?.value || "",
        address: document.getElementById("customerAddress")?.value || ""
      };
    }

    function restoreCheckoutDraft(draft) {
      const customer = document.getElementById("customerName");
      const phone = document.getElementById("customerPhone");
      const address = document.getElementById("customerAddress");

      if (customer) customer.value = draft.customer || "";
      if (phone) phone.value = draft.phone || "";
      if (address) address.value = draft.address || "";
    }

    function getCheckoutFocusState() {
      const active = document.activeElement;
      if (!active || !["customerName", "customerPhone", "customerAddress"].includes(active.id)) {
        return null;
      }

      return {
        id: active.id,
        start: active.selectionStart,
        end: active.selectionEnd
      };
    }

    function restoreCheckoutFocus(state) {
      if (!state) return;

      const input = document.getElementById(state.id);
      if (!input) return;

      input.focus();
      if (typeof state.start === "number" && typeof state.end === "number") {
        input.setSelectionRange(state.start, state.end);
      }
    }

    async function loadCart() {
      const draft = getCheckoutDraft();
      const focusState = getCheckoutFocusState();
      const cartRes = await fetch(getCategoryCartUrl());
      const initialCartData = await cartRes.json();
      const data = compactCartDuplicates(initialCartData);
      latestCartItems = Array.isArray(data) ? data : [];
      updateShopCartBadge();
      const now = Date.now();
      const needRefreshProducts = !productsById.size || now - lastProductsSyncAt > 5000;
      if (needRefreshProducts) {
        const productsRes = await fetch(getCategoryProductsUrl());
        const productsData = await productsRes.json();
        productsById = new Map(productsData.map((item) => [Number(item.id), item]));
        lastProductsSyncAt = now;
      }

      const productsMap = Object.fromEntries([...productsById.entries()]);
      const groups = new Map();

      data.forEach((item) => {
        const product = productsMap[item.id];
        const category = normalizeCategory(item.category || product?.category);
        if (!groups.has(category)) {
          groups.set(category, { items: [], subtotal: 0 });
        }

        const group = groups.get(category);
        const price = Number(product?.price ?? item.price ?? 0);
        group.items.push({ item, product, price });
        group.subtotal += price * item.qty;
      });

      const categories = [...groups.keys()];

      if (!data.length) {
        document.getElementById("cart").innerHTML = '<div class="empty">Giỏ hàng đang trống</div>';
        restoreCheckoutDraft(draft);
        restoreCheckoutFocus(focusState);
        return;
      }

      let total = 0;
      let html = categories.map((category) => {
        const group = groups.get(category);
        if (!group) return "";

        total += group.subtotal;

        return `
          <div class="cart-category-block">
            <div class="cart-category-header">
              <div>
                <strong>${category}</strong>
                <div><span>${group.items.length} sản phẩm</span></div>
              </div>
              <div class="cart-category-total-amount">${group.subtotal.toLocaleString()}đ</div>
            </div>
            ${group.items.map(({ item, product, price }) => {
              const oldPrice = Number(product?.oldPrice ?? item.oldPrice ?? price);
              const comboStock = Number(item?.comboStock);
              const stockLimit = Number.isFinite(comboStock)
                ? Math.max(0, Math.floor(comboStock))
                : Math.max(0, Math.floor(Number(product?.stock ?? item.stock ?? 0) || 0));
              const variants = getVariantImages(product || item);
              const variantNames = getVariantNames(product || item);
              const selectedVariantIndexByImage = variants.findIndex((url) => url === String(item.image || ""));
              const selectedVariantIndexByName = variantNames.findIndex((name) => String(name || "").trim().toLowerCase() === String(item.variantName || "").trim().toLowerCase());
              const selectedVariantIndex = selectedVariantIndexByImage >= 0
                ? selectedVariantIndexByImage
                : (selectedVariantIndexByName >= 0 ? selectedVariantIndexByName : 0);
              const selectedVariantName = item.variantName || getVariantDisplayName(product || item, selectedVariantIndex, variants[selectedVariantIndex] || item.image || "");
              const sizeOptions = getAvailableSizesByVariant(product || item, selectedVariantIndex, item.selectedSize || "");
              const selectedSize = sizeOptions.find((size) => size.toLowerCase() === String(item.selectedSize || "").trim().toLowerCase()) || sizeOptions[0] || String(item.selectedSize || "");
              return `
                <div class="cart-card">
                  <img src="${item.image || "https://placehold.co/80x80?text=No+Image"}" alt="${item.name}" loading="lazy" decoding="async" />
                  <div class="cart-info">
                    <div class="cart-name">${item.name}</div>
                    <div class="cart-qty cart-meta-compact">${selectedVariantName ? `Đã chọn: ${selectedVariantName}` : ""}${selectedSize ? `${selectedVariantName ? " / " : "Đã chọn: "}${selectedSize}` : ""}</div>
                    <div class="cart-qty">SKU: ${item.sku || "—"} · ${item.variantName ? `Tồn màu: ${stockLimit}` : `Tồn kho: ${stockLimit}`}</div>
                    <div class="cart-option-grid">
                      ${variants.length > 1 ? `
                        <div class="cart-option-field">
                          <span class="cart-option-label">Màu sắc-size</span>
                          <select class="cart-option-select" onchange='changeCartVariant(${item.id}, Number(this.value), ${JSON.stringify(selectedSize || "")}, ${JSON.stringify(item.variantKey || "default")}, ${JSON.stringify(item.sizeKey || "size:default")}, ${JSON.stringify(item.itemKey || "")}, ${JSON.stringify(category)})'>
                            ${variants.map((img, index) => `<option value="${index}" ${index === selectedVariantIndex ? "selected" : ""}>${getVariantDisplayName(product || item, index, img)}</option>`).join("")}
                          </select>
                        </div>
                      ` : ""}
                      ${sizeOptions.length ? `
                        <div class="cart-option-field">
                          <span class="cart-option-label">Size</span>
                          <select class="cart-option-select" onchange='changeCartSize(${item.id}, ${selectedVariantIndex}, this.value, ${JSON.stringify(item.variantKey || "default")}, ${JSON.stringify(item.sizeKey || "size:default")}, ${JSON.stringify(item.itemKey || "")}, ${JSON.stringify(category)})'>
                            ${sizeOptions.map((size) => `<option value="${String(size).replace(/"/g, "&quot;")}" ${String(size) === String(selectedSize) ? "selected" : ""}>${size}</option>`).join("")}
                          </select>
                        </div>
                      ` : ""}
                    </div>
                    <div class="qty-control">
                      <button class="qty-btn" onclick='changeQty(${item.id}, ${item.qty - 1}, ${JSON.stringify(item.variantKey || "default")}, ${JSON.stringify(item.sizeKey || "size:default")}, ${JSON.stringify(item.itemKey || "")})'>−</button>
                      <span class="qty-value">${item.qty}</span>
                      <button class="qty-btn" ${item.qty >= stockLimit ? "disabled" : ""} onclick='changeQty(${item.id}, ${item.qty + 1}, ${JSON.stringify(item.variantKey || "default")}, ${JSON.stringify(item.sizeKey || "size:default")}, ${JSON.stringify(item.itemKey || "")})'>+</button>
                    </div>
                  </div>
                  <div class="price-block">
                    <span class="price">${(price * item.qty).toLocaleString()}đ</span>
                    <span class="price-old">${(oldPrice * item.qty).toLocaleString()}đ</span>
                  </div>
                  <button class="cart-remove" onclick='removeItem(${item.id}, ${JSON.stringify(item.variantKey || "default")}, ${JSON.stringify(item.sizeKey || "size:default")}, ${JSON.stringify(item.itemKey || "")})' title="Bỏ sản phẩm này">✕</button>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }).join("");

      const shippingFee = getShippingFee(total);
      const finalTotal = total + shippingFee;

      html += `
        <div class="cart-total">
          <span>Tổng tiền</span>
          <span>${total.toLocaleString()}đ</span>
        </div>
        <form class="checkout-form" onsubmit="event.preventDefault(); checkout();">
          <div class="checkout-form-title">Thông tin khách đặt hàng</div>
          <input id="customerName" placeholder="Họ tên khách" required />
          <input id="customerPhone" placeholder="Số điện thoại" required />
          <input id="customerAddress" placeholder="Địa chỉ nhận hàng" required />
          <div class="checkout-submit-total">Tạm tính: ${total.toLocaleString()}đ<br/>Phí ship: ${shippingFee.toLocaleString()}đ<br/>Tổng thanh toán: ${finalTotal.toLocaleString()}đ</div>
          <button class="btn btn-buy-red" type="submit">Mua Hàng</button>
        </form>
      `;

      document.getElementById("cart").innerHTML = html;
      restoreCheckoutDraft(draft);
      restoreCheckoutFocus(focusState);
    }

      const product = getQuickOrderProduct();
      if (!product) return;
      const variants = getVariantImages(product);
      const safeIndex = Math.max(0, Math.min(Number(variantIndex) || 0, variants.length - 1));
      const stock = getColorStockByVariant(product, safeIndex, Number(product?.stock || 0));
      if (stock <= 0) {
        showToast("Màu này đã hết hàng", "error");
        return;
      }

      quickOrderState.variantIndex = safeIndex;
      quickOrderState.size = getAvailableSizesByVariant(product, safeIndex)[0] || "";
      quickOrderState.qty = Math.min(Math.max(1, quickOrderState.qty || 1), stock);
      renderQuickOrderPopup();
    }

    function selectQuickOrderSize(sizeValue) {
      const product = getQuickOrderProduct();
      if (!product) return;
      quickOrderState.size = String(sizeValue || "").trim();
      renderQuickOrderPopup();
    }

    function changeQuickOrderQty(nextQty) {
      const product = getQuickOrderProduct();
      if (!product) return;
      const stock = getColorStockByVariant(product, getQuickOrderSelectedVariantIndex(product), Number(product?.stock || 0));
      quickOrderState.qty = Math.max(1, Math.min(Math.max(1, Number(nextQty) || 1), Math.max(1, stock)));
      renderQuickOrderPopup();
    }

    async function removeItem(id, variantKey = "", sizeKey = "", itemKey = "") {
      const res = await fetch(API + "/change", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, qty: 0, variantKey, sizeKey, itemKey })
      });

      const data = await res.json();

      if (!res.ok) {
        showToast(data.error || "Không thể bỏ sản phẩm", "error");
        return;
      }

      await Promise.all([loadCart(), load(false)]);
      showToast("Đã bỏ sản phẩm khỏi giỏ hàng");
    }

    async function changeQty(id, qty, variantKey = "", sizeKey = "", itemKey = "") {
      const res = await fetch(API + "/change", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, qty, variantKey, sizeKey, itemKey })
      });

      const data = await res.json();

      if (!res.ok) {
        showToast(data.error || "Không thể cập nhật số lượng", "error");
        return;
      }

      await Promise.all([loadCart(), load(false)]);
      showToast("Đã cập nhật số lượng");
    }

    async function changeCartVariant(id, variantIndex, currentSize = "", variantKey = "", sizeKey = "", itemKey = "", category = "") {
      const product = productsById.get(Number(id));
      if (!product) {
        showToast("Không tìm thấy sản phẩm", "error");
        return;
      }

      const variants = getVariantImages(product);
      const safeIndex = Math.max(0, Math.min(Number(variantIndex) || 0, Math.max(0, variants.length - 1)));
      const nextImage = variants[safeIndex] || product.image || "";
      const nextVariantName = getVariantDisplayName(product, safeIndex, nextImage);
      const sizes = getAvailableSizesByVariant(product, safeIndex, currentSize);
      const normalizedSize = String(currentSize || "").trim().toLowerCase();
      const nextSize = sizes.find((size) => size.toLowerCase() === normalizedSize) || sizes[0] || "";
      const stock = getColorStockByVariant(product, safeIndex, Number(product?.stock || 0));

      if (stock <= 0) {
        showToast("Màu này đã hết hàng", "error");
        return;
      }

      const cartItems = Array.isArray(latestCartItems) ? latestCartItems : [];
      const currentItem = cartItems.find((item) => String(item.itemKey || "") === String(itemKey || ""))
        || cartItems.find((item) => Number(item.id) === Number(id));
      const nextQty = Math.max(1, Math.min(Math.max(1, Number(currentItem?.qty || 1)), Math.max(1, stock)));

      const res = await fetch(API + "/change", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id,
          qty: nextQty,
          category,
          variantKey,
          sizeKey,
          itemKey,
          image: nextImage,
          variantName: nextVariantName,
          size: nextSize
        })
      });

      const data = await res.json();
      if (!res.ok) {
        showToast(data.error || "Không thể đổi màu", "error");
        return;
      }

      await Promise.all([loadCart(), load(false)]);
      showToast("Đã cập nhật màu/size");
    }

    async function changeCartSize(id, variantIndex, sizeValue = "", variantKey = "", sizeKey = "", itemKey = "", category = "") {
      const product = productsById.get(Number(id));
      if (!product) {
        showToast("Không tìm thấy sản phẩm", "error");
        return;
      }

      const variants = getVariantImages(product);
      const safeIndex = Math.max(0, Math.min(Number(variantIndex) || 0, Math.max(0, variants.length - 1)));
      const nextImage = variants[safeIndex] || product.image || "";
      const nextVariantName = getVariantDisplayName(product, safeIndex, nextImage);
      const nextSize = String(sizeValue || "").trim();
      const stock = getColorStockByVariant(product, safeIndex, Number(product?.stock || 0));

      if (stock <= 0) {
        showToast("Màu này đã hết hàng", "error");
        return;
      }

      const cartItems = Array.isArray(latestCartItems) ? latestCartItems : [];
      const currentItem = cartItems.find((item) => String(item.itemKey || "") === String(itemKey || ""))
        || cartItems.find((item) => Number(item.id) === Number(id));
      const nextQty = Math.max(1, Math.min(Math.max(1, Number(currentItem?.qty || 1)), Math.max(1, stock)));

      const res = await fetch(API + "/change", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id,
          qty: nextQty,
          category,
          variantKey,
          sizeKey,
          itemKey,
          image: nextImage,
          variantName: nextVariantName,
          size: nextSize
        })
      });

      const data = await res.json();
      if (!res.ok) {
        showToast(data.error || "Không thể đổi size", "error");
        return;
      }

      await Promise.all([loadCart(), load(false)]);
      showToast("Đã cập nhật màu/size");
    }

    async function checkout() {
      const customer = document.getElementById("customerName").value.trim();
      const phone = document.getElementById("customerPhone").value.trim();
      const address = document.getElementById("customerAddress").value.trim();

      const res = await fetch(API + "/checkout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ customer, phone, address })
      });

      const data = await res.json();

      if (!res.ok) {
        showToast(data.error || "Đặt hàng thất bại", "error");
        return;
      }

      if (data.message) {
        showToast(data.message, "success");
      }

      showOrderSuccessModal();
      document.getElementById("customerName").value = "";
      document.getElementById("customerPhone").value = "";
      document.getElementById("customerAddress").value = "";
      await Promise.all([loadCart(), load(false)]);
    }

    async function quickCheckout() {
      const product = getQuickOrderProduct();
      if (!product) {
        showToast("Không tìm thấy sản phẩm", "error");
        return;
      }

      const customer = document.getElementById("quickCustomerName").value.trim();
      const phone = document.getElementById("quickCustomerPhone").value.trim();
      const address = document.getElementById("quickCustomerAddress").value.trim();

      const payload = {
        productId: Number(product.id),
        variantIndex: getQuickOrderSelectedVariantIndex(product),
        variantName: getVariantDisplayName(product, getQuickOrderSelectedVariantIndex(product), getVariantImages(product)[getQuickOrderSelectedVariantIndex(product)] || product.image || ""),
        size: quickOrderState.size || getAvailableSizesByVariant(product, getQuickOrderSelectedVariantIndex(product))[0] || "",
        qty: Math.max(1, Number(quickOrderState.qty || 1)),
        customer,
        phone,
        address
      };

      const res = await fetch(API + "/checkout/quick", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (!res.ok) {
        showPopupAlert(data.error || "Đặt hàng thất bại", "error");
        return;
      }

      if (data.message) showPopupSuccess();
      closeCartPopup();
      showOrderSuccessModal();
      resetQuickOrderState();
      await Promise.all([loadCart(), load(false)]);
    }

    if (!socket) {
      setInterval(() => {
        if (document.hidden) return;
        const focusState = getCheckoutFocusState();
        if (focusState) return;
        refreshRealtimeData();
      }, 10000);
    }

    async function bootstrapPage() {
      await load(true);
      await loadCart();
      closeCartPopup();
    }

    bootstrapPage();
  </script>
